{% extends "ba_base.html" %}
{% block title %}Delete Teacher{% endblock %}
{% block content %}

<h3>Delete Teacher</h3>
<p>Are you sure you want to delete <strong>{{ object.user.get_full_name }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Yes, Delete</button>
    <a class="btn btn-secondary" href="{% url 'teacher_list' %}">Cancel</a>
</form>

{% endblock %}
