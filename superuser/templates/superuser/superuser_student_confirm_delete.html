{% extends "ba_base.html" %}

{% block content %}
<div class="container py-5">

    <div class="card shadow p-4 text-center">

        <h3 class="text-danger fw-bold mb-3">
            Delete Student Record
        </h3>

        <p class="mb-4">Are you sure you want to permanently delete:</p>

        <h4>
            {{ object.surname }} {{ object.first_name }} {{ object.middle_name }}
        </h4>

        <form method="POST">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
            <a href="{% url 'super_user_student_list' %}" class="btn btn-secondary ms-3">Cancel</a>
        </form>

    </div>

</div>
{% endblock %}
