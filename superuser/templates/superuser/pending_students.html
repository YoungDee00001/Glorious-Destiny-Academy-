{% extends "ba_base.html" %}
{% block content %}
<h2>Pending Students</h2>
<table class="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Class Applying</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for student in students %}
        <tr>
            <td>{{ student.full_name }}</td>
            <td>{{ student.class_applying }}</td>
            <td>
                <a href="{% url 'approve_student' student.id %}" class="btn btn-success btn-sm">Approve</a>
                <a href="{% url 'reject_student' student.id %}" class="btn btn-danger btn-sm">Reject</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="3">No pending students</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
