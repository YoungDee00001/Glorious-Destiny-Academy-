{% extends "ba_base.html" %}
{% block title %}Delete Document{% endblock %}
{% block content %}

<h3>Delete Document</h3>
<p>Are you sure you want to delete <strong>{{ object.document_title }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Yes, Delete</button>
    <a class="btn btn-secondary" href="{% url 'document_list' %}">Cancel</a>
</form>
<a style="margin-top: 10px;" href="{% url 'SuperuserAdmin' %}" class="btn btn-primary">
    <i class="bi bi-house-door"></i> Back Home
</a>

{% endblock %}
