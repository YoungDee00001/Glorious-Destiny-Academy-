{% extends "ba_base.html" %}
{% block content %}
<h2>Pending Staff</h2>
<table class="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Position</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for staff in staff_members %}
        <tr>
            <td>{{ staff.full_name }}</td>
            <td>{{ staff.position }}</td>
            <td>
                <a href="{% url 'approve_staff' staff.id %}" class="btn btn-success btn-sm">Approve</a>
                <a href="{% url 'reject_staff' staff.id %}" class="btn btn-danger btn-sm">Reject</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="3">No pending staff</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
