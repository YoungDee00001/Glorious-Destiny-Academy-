{% extends "ba_base.html" %}
{% block title %}Folder Form{% endblock %}
{% block content %}

<h3>{{ view.object|default:'Add Folder' }}</h3>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button class="btn btn-success" type="submit">Save</button>
    <a class="btn btn-secondary" href="{% url 'folder_list' %}">Cancel</a>
</form>
<a style="margin-top: 10px;" href="{% url 'SuperuserAdmin' %}" class="btn btn-primary">
    <i class="bi bi-house-door"></i> Back Home
</a>

{% endblock %}
