{% extends 'ba_base.html' %}
{% load static %}


{% block content %}
<div class="container mt-4">
    <div class="row g-4">
        {% for student in students %}
        <div class="col-md-4 col-sm-6">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center">
                    <!-- Optional: add a student avatar -->
                    <div class="mb-3">
                        <img src="{% static 'images/student_avatar.png' %}" alt="Student Avatar" class="rounded-circle" width="80" height="80">
                    </div>
                    
                    <h5 class="card-title">{{ student.first_name }} {{ student.last_name }}</h5>
                    <p class="card-text">🎂 Birthday Today!</p>

                    <a href="{% url 'send_birthday_notification' student.id %}" class="btn btn-success btn-sm">
                        Send WhatsApp Message
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
