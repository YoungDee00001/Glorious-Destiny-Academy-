<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            padding: 30px;
        }
        h1 {
            color: #ff6b81;
            font-size: 28px;
            margin-bottom: 20px;
        }
        p {
            font-size: 16px;
            color: #333333;
            line-height: 1.5;
        }
        .photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px auto;
            border: 3px solid #ff6b81;
        }
        .gif {
            width: 300px;
            margin: 20px auto;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999999;
        }
        @media only screen and (max-width: 640px) {
            .container { padding: 20px; }
            h1 { font-size: 24px; }
            .gif { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Happy Birthday, {{ name }}! 🎂</h1>

        {% if photo_url %}
            <img src="{{ photo_url }}" alt="Birthday Photo" class="photo">
        {% else %}
            <img src="{{ gif_url }}" alt="Birthday GIF" class="gif">
        {% endif %}

        <p>Wishing you a wonderful day filled with happiness, laughter, and joy. May all your dreams come true!</p>

        <div class="footer">
            This email was sent automatically by the School Management System.
        </div>
    </div>
</body>
</html>
