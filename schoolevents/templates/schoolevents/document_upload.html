{% extends "ba_ase.html" %}
{% block content %}
<div class="container py-5">

    <h2 class="fw-bold mb-3">Upload Document for "{{ event.title }}"</h2>

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}

                <button class="btn btn-primary w-100 mt-3" type="submit">Upload Document</button>
            </form>

        </div>
    </div>

</div>
{% endblock %}
