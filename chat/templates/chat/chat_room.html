{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Chat Room</title>
</head>
<body>
    <h3>Chat with {{ room.teacher.username if request.user.parent_profile else room.parent.username }}</h3>

    <div id="chat-log" style="border:1px solid #ccc; padding:10px; height:300px; overflow-y:scroll;">
        {% for msg in messages %}
            <b>{{ msg.sender.username }}:</b> {{ msg.content }}<br>
        {% endfor %}
    </div>

    <input id="chat-message-input" type="text" size="100">
    <button id="chat-message-submit">Send</button>

    <script>
        const roomName = "{{ room.id }}";
        const ws_scheme = window.location.protocol === "https:" ? "wss" : "ws";
        const chatSocket = new WebSocket(
            ws_scheme + '://' + window.location.host + '/ws/chat/' + roomName + '/'
        );

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            const chatLog = document.getElementById('chat-log');
            chatLog.innerHTML += `<b>${data.sender}:</b> ${data.message}<br>`;
            chatLog.scrollTop = chatLog.scrollHeight;
        };

        document.getElementById('chat-message-submit').onclick = function(e) {
            const messageInput = document.getElementById('chat-message-input');
            const message = messageInput.value;
            chatSocket.send(JSON.stringify({'message': message}));
            messageInput.value = '';
        };
    </script>
</body>
</html>
