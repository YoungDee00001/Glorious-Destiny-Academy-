<h2>Your Chat Rooms</h2>
<ul>
{% for room in rooms %}
    <li>
        <a href="{% url 'chat_room' room.id %}">
            {% if request.user.role == 'parent' %}
                Teacher: {{ room.teacher.username }}
            {% else %}
                Parent: {{ room.parent.username }}
            {% endif %}
        </a>
    </li>
{% empty %}
    <li>No chat rooms yet.</li>
{% endfor %}
</ul>
