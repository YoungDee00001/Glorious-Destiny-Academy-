{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1 class="mt-5 text-success">logout</h1>
    <hr>
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-body">
                <h3 class="text-danger mb-3">Are you sure that you want to logout?</h3>
                <form method="POST" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="btn btn-outline-primary" type='submit'>Yes, logout</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
